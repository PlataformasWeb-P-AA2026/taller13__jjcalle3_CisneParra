<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Departamento</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>

  <header class="header">
    <div class="logo">UTPL</div>
    <nav class="menu">
      <a href="/">Inicio</a>
      <a href="/edificios">Edificios</a>
      <a href="/departamentos">Departamentos</a>
    </nav>
  </header>

  <main>
    <section class="form-section">
      <h2>Nuevo Departamento</h2>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <p><b>{{ message }}</b></p>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <label for="nombre_propietario">Nombre completo del propietario</label>
        <input type="text" id="nombre_propietario" name="nombre_propietario" placeholder="Ej. Julio Cisne" required>

        <label for="costo">Costo del departamento</label>
        <input type="number" step="0.01" id="costo" name="costo" placeholder="Ej. 350.00" required>

        <label for="numero_cuartos">Número de cuartos</label>
        <input type="number" id="numero_cuartos" name="numero_cuartos" placeholder="Ej. 3" required>

        <label for="edificio">Edificio</label>
        <select id="edificio" name="edificio" required>
          {% for e in edificios %}
          <option value="{{ e['url'] }}">{{ e['nombre'] }} ({{ e['ciudad'] }})</option>
          {% endfor %}
        </select>

        <button type="submit">Guardar departamento</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 UTPL - Taller 13 Inmobiliaria (Flask).</p>
  </footer>

</body>
</html>
